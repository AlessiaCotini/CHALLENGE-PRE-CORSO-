<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Basics</title>
</head>
<body style="width: 800px;">
    <h1 style="background-color: green;color: rgb(236, 229, 229);text-align: center; width:100%;">AIUTACI A CREARE UN ACCOUNT CON LE TUE PREFERENZE GIA' IMPOSTATE</h1>

    <div style="text-align: center;">
    <input type="text" placeholder="Nome"style="width: 300px;"/>
    </div>
    <div style="text-align: center;">

    </div>

    <input type="email"placeholder="indirizzo email"style="width: 300px;"/>

    <input type="password"placeholder="Data di nascita"style="width: 300px;"/>
    </div>
    <div style="text-align: center;">
    <input type="number"placeholder="Numero di telefono" style="width: 300px;"/>
    </div>

    <div>
        <input type="checkbox"/>Cantautorato italiano
    </div>

    </div>

    </div>

    <div>

    </div>

        <input type="radio"/>Accettazione termini e condizioni
    </div>
    <div style="text-align: center;">
<button type="submit" style="background-color: green; color:whitesmoke; width: 200px; height: 60px;text-align: center;">Invia QUI la registrazione</button>
    </div>
</form>

</html>
